services:
  app:
    image: minutes-ai:latest
    container_name: minutes-ai-app
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount the static files read-only for live-reload development
      - .:/usr/share/nginx/html:ro
      # Mount the custom nginx configuration file read-only
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    # No host port mapping. In production, a Caddy reverse proxy on the
    # `web-net` docker network reaches this container by name and terminates
    # TLS + auth. For local dev, copy docker-compose.override.example.yml to
    # docker-compose.override.yml to re-expose port 8081 on the host.
    networks:
      - default
      - web-net
    depends_on:
      - api

  api:
    image: minutes-ai-api:latest
    container_name: minutes-ai-api
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      # Persistent meeting storage. Survives container rebuilds and `down`.
      # Inspect with: docker run --rm -v minutes-ai_meetings_data:/data alpine ls /data
      - meetings_data:/data
    networks:
      - default
    # No host port mapping — only the app container (via the default network)
    # talks to /api/*, and nginx proxies external requests to it.

networks:
  # Shared external network for the Caddy reverse proxy (see DEPLOY.md).
  # If you don't run Caddy and just want the app on localhost, the override
  # file makes web-net optional.
  web-net:
    external: true

volumes:
  meetings_data:
